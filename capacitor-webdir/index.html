<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>Fight Calendar</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #0a0a0a;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      }
      .wrap {
        height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1rem;
        text-align: center;
        padding: 2rem;
      }
      .spinner {
        width: 38px;
        height: 38px;
        border: 3px solid #2a2a2a;
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      h1 {
        font-size: 1.25rem;
        font-weight: 700;
        margin: 0;
      }
      p {
        color: #888;
        font-size: 0.9rem;
        margin: 0;
        max-width: 22rem;
        line-height: 1.4;
      }
    </style>
  </head>
  <body>
    <!--
      Diese Datei ist nur ein Fallback/Ladebildschirm, der im nativen Bundle
      mitgeliefert wird. Im Normalfall lädt die App direkt die in
      capacitor.config.ts hinterlegte Server-URL.
    -->
    <div class="wrap">
      <div class="spinner"></div>
      <h1>Fight Calendar</h1>
      <p>Verbinde mit dem Server… Falls das länger dauert, prüfe deine Internetverbindung.</p>
    </div>
  </body>
</html>
